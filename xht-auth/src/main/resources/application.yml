server:
  port: 9000
  servlet:
    session:
      timeout: 3600s
spring:
  session:
    redis:
      namespace: xht:sso
      repository-type: default
  profiles:
    active: dev
  application:
    name: xht-auth
  security:
    oauth2:
      resource server:
        opaque token:
          introspection-uri: http://www.xht.sso.com:9000/oauth2/introspect
          client-id: oidc-client
          client-secret: secret
        jwt:
          issuer-uri: ${xht.security.oauth2.issuer}
  # 数据源配置
  datasource:
    password: 123456
    url: jdbc:mysql://192.168.100.1:3306/xht_platform?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: @nacos.discovery.address@
        username: @nacos.username@
        password: @nacos.password@
        namespace: @nacos.namespace@
        group: @nacos.group@
      config:
        server-addr: @nacos.config.address@
        username: @nacos.username@
        password: @nacos.password@
        namespace: @nacos.namespace@
        group: @nacos.group@
        file-extension: yml
        prefix: ${spring.application.name} # 默认配置
  data:
    redis:
      host: 192.168.100.1
      port: 6379
      timeout: 10000
      jedis:
        pool:
          enabled: true
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
      password:
      database: 1
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  override-with-generic-response: false # 解决springdoc和knife4版本冲突问题
  default-flat-param-object: true # 解决参数列表显示问题
  paths-to-exclude:
    - /api/**
    - /error
    - /actuator/**
    - /favicon.ico
    - /css/**
xht:
  global:
    banner:
      enable: true
    app-name: 授权服务
    host-name: www.xht.sso.com
  security:
    remember-me:
      cache-key: xht:rememberMe
      cookie-name: xht-token
      parameter: rememberMe
      token-validity-seconds: 1209600
    oauth2:
      issuer: http://www.xht.sso.com:9000
      authorization-server:
        logout-url: /sso/logout
        form-login-url: /sso/unLogin
        phone-login-url: /sso/phoneLogin
        login-page: http://www.xht.sso.com:5000/sso/login
        consent-page: http://www.xht.sso.com:5000/sso/confirm_access
      allowed-origins:
        - www.xht.sso.com
    ignore:
      whites:
        add-swagger-ignore-urls: true
        add-default-ignore-urls: true
        urls:
          - /sso/phoneLogin
          - /sso/unLogin
          - /qrcode/query
  safety:
    xss:
      enable: true
    header:
      auth-key: X-Auth-Token
mybatis-plus:
  configuration:
    default-executor-type: batch
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration-properties:
    delFlag: 0