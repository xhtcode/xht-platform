server:
  port: 8180
spring:
  application:
    name: xht-demo
  # 数据源配置
  datasource:
    password: 123456
    url: jdbc:mysql://localhost:3306/xht_platform?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&rewriteBatchedStatements=true
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  profiles:
    active: dev
  data:
    redis:
      password:
      host: 127.0.0.1
      port: 6379
      database: 1
    mongodb:
      uri: mongodb://127.0.0.1:27017/moaZwfw
springdoc:
  api-docs:
    enabled: true
  override-with-generic-response: false # 解决springdoc和knife4版本冲突问题
xht:
  safety:
    xss:
      enable: true
  global:
    banner:
      enable: true
    app-name: 案例工程
    host-name: www.xht.com
    dict:
      unit: microseconds
      properties:
        timeout: 5000
        retry: 3
        retry-interval: 5000
  blog:
    repository-type: default
mybatis-plus:
  configuration:
    default-executor-type: batch
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      update-strategy:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration-properties:
    delFlag: ${mybatis-plus.global-config.db-config.logic-not-delete-value}